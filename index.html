<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Verma | Windows Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/os.css">
</head>
<body>
    <section id="boot-screen" aria-label="Boot screen">
        <div class="boot-logo"></div>
        <div class="boot-loader" aria-hidden="true"></div>
    </section>

    <section id="lock-screen" class="hidden" aria-label="Lock screen">
        <div class="lock-time" id="lock-time"></div>
        <div class="lock-date" id="lock-date"></div>
        <button id="unlock-btn" class="unlock-btn">Sign in</button>
    </section>

    <section id="intro-screen" class="hidden" aria-label="Intro screen">
        <div class="intro-card">
            <h2>Welcome</h2>
            <p>You are about to dive into Harsh Verma's WebOS Portfolio.</p>
            <button id="dive-btn" class="unlock-btn">Dive In</button>
        </div>
    </section>

    <div class="wallpaper" aria-hidden="true"></div>
    <div class="wallpaper-glow"></div>

    <main id="desktop" aria-label="Desktop"></main>

    <section id="windows-layer" aria-label="Windows layer"></section>

    <div id="context-menu" class="menu hidden" role="menu"></div>

    <section id="start-menu" class="hidden" aria-label="Start menu">
        <div class="start-search-wrap">
            <input id="start-search" class="start-search" placeholder="Type here to search" aria-label="Search" />
        </div>
        <div class="start-header">
            <div class="avatar">HV</div>
            <div>
                <h2>Harsh Verma</h2>
                <p>Open Source + Backend + Embedded Systems</p>
            </div>
        </div>
        <div class="start-section-title">Pinned</div>
        <div class="start-grid" id="start-pins"></div>
        <div class="start-section-title">Recommended</div>
        <div id="start-recommended" class="start-recommended"></div>
        <div class="start-footer">
            <a href="https://github.com/harshverma27" target="_blank" rel="noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/harshhvermaa/" target="_blank" rel="noreferrer">LinkedIn</a>
            <button id="power-btn" class="power-btn" aria-label="Power menu">⏻</button>
        </div>
    </section>

    <footer id="taskbar">
        <div class="tb-left"></div>
        <div class="tb-center">
            <button id="start-btn" class="tb-icon" aria-label="Open start menu">
                <img src="assets/icons/windows.svg" class="icon-svg" alt="" aria-hidden="true">
            </button>
            <button class="tb-icon pin-app" data-pin="about" aria-label="Open About">
                <span class="tb-glyph doc"></span>
            </button>
            <button class="tb-icon pin-app" data-pin="projects" aria-label="Open Projects">
                <span class="tb-glyph folder"></span>
            </button>
            <button class="tb-icon pin-app" data-pin="opensource" aria-label="Open Open Source">
                <span class="tb-glyph code"></span>
            </button>
            <div id="running-apps"></div>
        </div>
        <div class="tb-right">
            <button id="quick-btn" class="tray-btn" aria-label="Quick settings">⚙</button>
            <button id="net-btn" class="tray-btn" aria-label="Network">📶</button>
            <button id="clock" class="clock" aria-label="Clock"></button>
        </div>
    </footer>

    <section id="quick-panel" class="flyout hidden" aria-label="Quick settings panel">
        <h3>Quick Settings</h3>
        <div class="quick-grid">
            <button class="quick-tile">Wi-Fi</button>
            <button class="quick-tile">Bluetooth</button>
            <button class="quick-tile">Night light</button>
            <button class="quick-tile">Focus mode</button>
        </div>
        <div class="quick-slider-wrap">
            <label for="brightness">Brightness</label>
            <input id="brightness" type="range" min="40" max="130" value="100">
        </div>
    </section>

    <section id="calendar-panel" class="flyout hidden" aria-label="Calendar panel">
        <h3 id="calendar-month"></h3>
        <div id="calendar-grid" class="calendar-grid"></div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
