<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Verma | Windows Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/os.css">
</head>
<body>
    <div class="wallpaper"></div>
    <div class="wallpaper-glow"></div>

    <main id="desktop" aria-label="Desktop"></main>

    <section id="windows-layer" aria-label="Windows layer"></section>

    <div id="context-menu" class="menu hidden" role="menu"></div>

    <section id="start-menu" class="hidden" aria-label="Start menu">
        <div class="start-search-wrap">
            <input id="start-search" class="start-search" placeholder="Type here to search" aria-label="Search" />
        </div>
        <div class="start-header">
            <div class="avatar">HV</div>
            <div>
                <h2>Harsh Verma</h2>
                <p>Open Source + Backend + Embedded Systems</p>
            </div>
        </div>
        <div class="start-grid" id="start-pins"></div>
        <div class="start-footer">
            <a href="https://github.com/harshverma27" target="_blank" rel="noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/harshhvermaa/" target="_blank" rel="noreferrer">LinkedIn</a>
        </div>
    </section>

    <footer id="taskbar">
        <div class="tb-left"></div>
        <div class="tb-center">
            <button id="start-btn" class="tb-icon" aria-label="Open start menu">
                <span class="win-logo" aria-hidden="true"></span>
            </button>
            <div id="running-apps"></div>
        </div>
        <div class="tb-right">
            <span class="tray">NET</span>
            <span class="tray">ENG</span>
            <button id="clock" class="clock" aria-label="Clock"></button>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
